<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            width: 380px;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .login-title {
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .btn-custom {
            width: 100%;
            background: #6c5ce7;
            color: white;
        }

        .btn-custom:hover {
            background: #5a4bd1;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h3 class="login-title">Login</h3>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label>Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        {% if form.errors %}
            <div class="alert alert-danger">
                Username ose password gabim
            </div>
        {% endif %}

        <button type="submit" class="btn btn-custom">Hyr</button>
    </form>
</div>

</body>
</html>

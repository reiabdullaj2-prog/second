<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Financat</title>
</head>
<body class="container mt-5">

    <h1 class="mb-4">Menaxhimi i Financave</h1>

    <div class="row">
        <div class="col-md-4">
            <div class="card p-3 mb-3">
                <h5>Të Ardhura</h5>
                <p class="fs-4">{{ fitimet_totale }} Lekë</p>
                <a href="{% url 'krijo_ardhura' %}" class="btn btn-sm btn-outline-success">Shto të Ardhura</a>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3 mb-3">
                <h5>Shpenzime</h5>
                <p class="fs-4">{{ shpenzimet_totale }} Lekë</p>
                <a href="{% url 'krijo_shpenzime' %}" class="btn btn-sm btn-outline-danger">Shto Shpenzim</a>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3 mb-3 border-primary">
                <h5>Bilanci</h5>
                <p class="fs-4 text-primary">{{ gjendja }} Lekë</p>
            </div>
        </div>
    

    <div class="mt-4 d-flex justify-content-between align-items-center">

    <!-- LEFT SIDE -->
    <div>
        <a href="{% url 'fitimet_list' %}" class="btn btn-success">Shiko të ardhurat</a>
        <a href="{% url 'shpenzimet_list' %}" class="btn btn-danger">Shiko shpenzimet</a>
        <a href="{% url 'statistikat' %}" class="btn btn-primary">Statistikat</a>
    </div>

    <!-- RIGHT SIDE -->
    <div>
        <form method="post" action="{% url 'logout' %}" style="display:inline;">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-danger">
                Logout
            </button>
        </form>
    </div>
    </div>

</body>
</html>

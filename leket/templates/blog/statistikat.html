<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Statistikat</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="p-4">

<div class="container">

    <h2 class="mb-4">Statistikat për vitin: {{ viti }}</h2>

    <!-- Vitet -->
    <div class="mb-4">
        <a href="?viti=2025" class="btn btn-outline-primary">2025</a>
        <a href="?viti=2026" class="btn btn-outline-primary">2026</a>
        <a href="?viti=2027" class="btn btn-outline-primary">2027</a>
        <a href="{% url 'statistikat' %}" class="btn btn-outline-secondary">Të gjitha</a>
    </div>

    <!-- KARTAT -->
    <div class="row mb-4">

        <div class="col-md-4">
            <div class="card p-3 border-success">
                <h5>Fitimet</h5>
                <h3 class="text-success">{{ fitimet_totale }} L</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 border-danger">
                <h5>Shpenzimet</h5>
                <h3 class="text-danger">{{ shpenzimet_totale }} L</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 border-primary">
                <h5>Gjendja</h5>
                <h3 class="text-primary">{{ gjendja }} L</h3>
            </div>
        </div>

    </div>

    <!-- GRAFIKËT -->
    <div class="row">

        <!-- FITIMET -->
        <div class="col-md-6 d-flex justify-content-center">
            <div style="width: 320px;">
                <h6 class="text-center">Fitimet sipas kategorisë</h6>
                <canvas id="fitimeChart"></canvas>
            </div>
        </div>

        <!-- SHPENZIMET -->
        <div class="col-md-6 d-flex justify-content-center">
            <div style="width: 320px;">
                <h6 class="text-center">Shpenzimet sipas kategorisë</h6>
                <canvas id="shpenzimeChart"></canvas>
            </div>
        </div>

    </div>

    <!-- BUTON KTHIM -->
    <div class="mt-4">
        <a href="{% url 'shtepia' %}" class="btn btn-secondary">
            Kthehu në faqen kryesore
        </a>
    </div>

</div>

<!-- CHART FITIMET -->
<script>
const fitimeData = {{ totale_fitime|safe }};
const fitimeLabels = {{ labels_fitime|safe }};
const totalFitime = fitimeData.reduce((a, b) => a + b, 0);

new Chart(document.getElementById('fitimeChart'), {
    type: 'pie',
    data: {
        labels: fitimeLabels,
        datasets: [{
            data: fitimeData,
            backgroundColor: ['#198754','#20c997','#0d6efd','#ffc107','#6610f2']
        }]
    },
    options: {
        plugins: {
            tooltip: {
                callbacks: {
                    label: function(context) {
                        let value = context.raw;
                        let percent = ((value / totalFitime) * 100).toFixed(1);
                        return context.label + ': ' + value + ' L (' + percent + '%)';
                    }
                }
            }
        }
    }
});
</script>

<!-- CHART SHPENZIMET -->
<script>
const shpenzimeData = {{ totale_shpenzime|safe }};
const shpenzimeLabels = {{ labels_shpenzime|safe }};
const totalShpenzime = shpenzimeData.reduce((a, b) => a + b, 0);

new Chart(document.getElementById('shpenzimeChart'), {
    type: 'pie',
    data: {
        labels: shpenzimeLabels,
        datasets: [{
            data: shpenzimeData,
            backgroundColor: ['#dc3545','#fd7e14','#6f42c1','#0dcaf0','#20c997']
        }]
    },
    options: {
        plugins: {
            tooltip: {
                callbacks: {
                    label: function(context) {
                        let value = context.raw;
                        let percent = ((value / totalShpenzime) * 100).toFixed(1);
                        return context.label + ': ' + value + ' L (' + percent + '%)';
                    }
                }
            }
        }
    }
});
</script>

</body>
</html>
